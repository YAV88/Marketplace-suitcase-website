<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVALKA - Патруль модерации</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d6d3d1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 sm:p-8 text-stone-800">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-shield-halved text-red-600 text-3xl sm:text-4xl drop-shadow-sm"></i>
                <h1 class="text-3xl sm:text-4xl font-black uppercase tracking-tighter">Svalka <span class="text-red-600">Admin</span></h1>
            </div>
            <a href="index.html" class="text-stone-500 hover:text-stone-800 font-bold transition flex items-center gap-2 bg-white px-4 py-2 rounded-xl border shadow-sm"><i class="fa-solid fa-arrow-left"></i> На сайт</a>
        </div>
        
        <div class="bg-white p-2 sm:p-6 rounded-[2rem] shadow-sm border border-stone-200 min-h-[500px] flex flex-col">
            
            <div class="flex flex-col md:flex-row justify-between gap-4 mb-6 p-2 sm:p-0">
                <div class="flex bg-stone-100 p-1 rounded-xl w-full md:w-max shrink-0 overflow-x-auto custom-scrollbar">
                    <button onclick="switchTab('items')" id="tab-items" class="flex-1 md:flex-none px-6 py-2.5 rounded-lg bg-white shadow-sm font-bold text-sm text-stone-900 transition flex items-center justify-center gap-2 shrink-0"><i class="fa-solid fa-box-open text-brand-500"></i> Товары</button>
                    <button onclick="switchTab('users')" id="tab-users" class="flex-1 md:flex-none px-6 py-2.5 rounded-lg text-stone-500 font-bold text-sm hover:text-stone-900 transition flex items-center justify-center gap-2 shrink-0"><i class="fa-solid fa-users text-indigo-500"></i> Пользователи</button>
                    <!-- НОВАЯ ВКЛАДКА ЖАЛОБ -->
                    <button onclick="switchTab('reports')" id="tab-reports" class="flex-1 md:flex-none px-6 py-2.5 rounded-lg text-stone-500 font-bold text-sm hover:text-stone-900 transition flex items-center justify-center gap-2 shrink-0"><i class="fa-solid fa-dumpster-fire text-red-500"></i> Жалобы</button>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <select id="admin-category-filter" onchange="renderList()" class="bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm font-medium outline-none focus:border-brand-500 focus:bg-white transition cursor-pointer max-w-[150px]">
                        <option value="">Все категории</option>
                        <option value="Одежда">Одежда</option> <option value="Электроника">Электроника</option> <option value="Интерьер">Интерьер</option>
                        <option value="Транспорт">Транспорт</option> <option value="Услуги">Услуги</option> <option value="Жилье">Жилье</option>
                        <option value="Работа">Работа</option> <option value="Бизнес">Бизнес</option> <option value="Детям">Детям</option>
                    </select>

                    <div class="relative flex-1 md:w-64 shrink-0">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                        <input type="text" id="admin-search" oninput="renderList()" placeholder="Поиск товаров..." class="w-full bg-stone-50 border border-stone-200 rounded-xl pl-11 pr-4 py-3 text-sm font-medium outline-none focus:border-brand-500 focus:bg-white transition shadow-inner">
                    </div>
                </div>
            </div>
            
            <div id="admin-list" class="space-y-3 flex-1 overflow-y-auto custom-scrollbar pr-2 pb-4">
                <div class="text-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-stone-300"></i></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // КЛЮЧИ
        const supabaseUrl = 'https://jeinonooelndbtjalnwa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplaW5vbm9vZWxuZGJ0amFsbndhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjUwNDMsImV4cCI6MjA5MjIwMTA0M30.3g4TS3XSnnZujgXmyxSIy3d9SbiX7BSUOreq3LPH6gI';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let adminState = { items: [], profiles: [], reports: [], currentTab: 'items', isLoading: true };

        async function initAdminPanel() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return showError("Доступ запрещен. Вы не вошли в аккаунт!");

            const { data: profile } = await supabaseClient.from('profiles').select('is_admin').eq('id', user.id).single();
            if (!profile || profile.is_admin !== true) return showError("У вас нет прав модератора!");

            await loadData();
        }

        function showError(msg) {
            document.getElementById('admin-list').innerHTML = `<div class="bg-red-50 text-red-600 p-8 rounded-2xl font-bold text-center border border-red-200 mt-10 max-w-lg mx-auto"><i class="fa-solid fa-hand-paper text-5xl mb-4 block opacity-50"></i> ${msg}</div>`;
        }

        async function loadData() {
            try {
                // ЗАГРУЖАЕМ ЖАЛОБЫ (reports)
                const [itemsRes, profilesRes, reportsRes] = await Promise.all([
                    supabaseClient.from('items').select('*').order('created_at', { ascending: false }),
                    supabaseClient.rpc('get_all_users_for_admin'),
                    supabaseClient.from('reports').select('*').order('created_at', { ascending: false })
                ]);
                
                if (itemsRes.error) throw itemsRes.error;
                if (profilesRes.error) throw profilesRes.error;
                if (reportsRes.error && reportsRes.error.code !== '42P01') throw reportsRes.error; // 42P01 - если таблица еще пустая/не создана

                adminState.items = itemsRes.data || [];
                adminState.profiles = profilesRes.data || [];
                adminState.reports = reportsRes.data || [];
                adminState.isLoading = false;
                renderList();
            } catch (e) { showError(`Ошибка: ${e.message}`); }
        }

        function switchTab(tab) {
            adminState.currentTab = tab;
            const btnItems = document.getElementById('tab-items');
            const btnUsers = document.getElementById('tab-users');
            const btnReports = document.getElementById('tab-reports');
            const searchInput = document.getElementById('admin-search');
            const catFilter = document.getElementById('admin-category-filter');
            
            const activeClass = "flex-1 md:flex-none px-6 py-2.5 rounded-lg bg-white shadow-sm font-bold text-sm text-stone-900 transition flex items-center justify-center gap-2 shrink-0";
            const inactiveClass = "flex-1 md:flex-none px-6 py-2.5 rounded-lg text-stone-500 font-bold text-sm hover:text-stone-900 transition flex items-center justify-center gap-2 shrink-0";

            btnItems.className = tab === 'items' ? activeClass : inactiveClass;
            btnUsers.className = tab === 'users' ? activeClass : inactiveClass;
            btnReports.className = tab === 'reports' ? activeClass : inactiveClass;

            if (tab === 'items') {
                searchInput.placeholder = "Поиск товаров...";
                catFilter.style.display = "block"; 
            } else if (tab === 'users') {
                searchInput.placeholder = "Поиск по email или ID...";
                catFilter.style.display = "none"; 
                catFilter.value = ""; 
            } else {
                searchInput.placeholder = "Поиск по жалобам...";
                catFilter.style.display = "none"; 
                catFilter.value = ""; 
            }
            
            searchInput.value = ''; 
            renderList();
        }

        function renderList() {
            if (adminState.isLoading) return;
            const list = document.getElementById('admin-list');
            const searchTerm = document.getElementById('admin-search').value.toLowerCase().trim();
            const catFilter = document.getElementById('admin-category-filter').value;
            list.innerHTML = '';

            if (adminState.currentTab === 'items') {
                // ФИЛЬТРАЦИЯ ТОВАРОВ
                const filteredItems = adminState.items.filter(item => {
                    const matchSearch = (item.title || '').toLowerCase().includes(searchTerm) || item.id.toLowerCase().includes(searchTerm);
                    const matchCat = catFilter === "" || (item.category && item.category.startsWith(catFilter));
                    return matchSearch && matchCat;
                });

                if (filteredItems.length === 0) return list.innerHTML = '<div class="text-center py-20 text-stone-400 font-bold"><i class="fa-solid fa-box-open text-4xl mb-3 opacity-30 block"></i>Товары не найдены</div>';

                filteredItems.forEach(item => {
                    const imgUrl = (Array.isArray(item.images) && item.images.length > 0) ? item.images[0] : (item.image_url || 'https://via.placeholder.com/150');
                    const isVIP = item.highlighted_until ? new Date(item.highlighted_until) > new Date() : false;
                    list.insertAdjacentHTML('beforeend', `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 bg-stone-50 border border-stone-200 rounded-xl hover:border-stone-300 transition gap-4">
                            <div class="flex items-center gap-4 overflow-hidden w-full sm:w-auto">
                                <img src="${imgUrl}" class="w-14 h-14 rounded-lg object-cover shrink-0 border border-stone-200">
                                <div class="overflow-hidden">
                                    <div class="font-black text-stone-800 truncate text-base">${isVIP ? '<i class="fa-solid fa-crown text-amber-500 mr-1"></i>' : ''}${item.title || 'Без названия'}</div>
                                    <div class="text-xs text-stone-500 font-bold mt-1"><span class="bg-stone-200 px-2 py-0.5 rounded text-[10px] text-stone-600 mr-1">${item.category || 'Другое'}</span> Автор: ${item.author_name}</div>
                                    <div class="text-sm font-bold text-brand-600 mt-0.5">${item.price} ${item.currency}</div>
                                </div>
                            </div>
                            <button onclick="deleteItem('${item.id}', this)" class="w-full sm:w-auto bg-red-100 text-red-600 hover:bg-red-600 hover:text-white px-5 py-2.5 rounded-lg font-bold transition flex items-center justify-center gap-2 shrink-0">
                                <i class="fa-solid fa-trash"></i> Удалить
                            </button>
                        </div>
                    `);
                });
            } else if (adminState.currentTab === 'users') {
                // ФИЛЬТРАЦИЯ ПОЛЬЗОВАТЕЛЕЙ
                const filteredUsers = adminState.profiles.filter(user => 
                    (user.full_name || '').toLowerCase().includes(searchTerm) || 
                    (user.email || '').toLowerCase().includes(searchTerm) || 
                    user.id.toLowerCase().includes(searchTerm)
                );

                if (filteredUsers.length === 0) return list.innerHTML = '<div class="text-center py-20 text-stone-400 font-bold"><i class="fa-solid fa-users text-4xl mb-3 opacity-30 block"></i>Пользователи не найдены</div>';

                filteredUsers.forEach(user => {
                    const avatarUrl = user.avatar_url || 'https://via.placeholder.com/150';
                    const isPro = user.pro_until ? new Date(user.pro_until) > new Date() : false;
                    const itemsCount = adminState.items.filter(i => i.user_id === user.id).length;
                    const regDate = new Date(user.created_at).toLocaleDateString('ru-RU');
                    const phoneDisplay = user.phone ? `<span class="bg-stone-100 px-2 py-0.5 rounded-md border border-stone-200"><i class="fa-solid fa-phone text-stone-400 text-[10px] mr-1"></i>${user.phone}</span>` : '';
                    
                    list.insertAdjacentHTML('beforeend', `
                        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center p-4 bg-white border border-stone-200 rounded-xl hover:shadow-md transition gap-4">
                            <div class="flex items-center gap-4 overflow-hidden w-full lg:w-auto flex-1">
                                <div class="relative shrink-0">
                                    <img src="${avatarUrl}" class="w-14 h-14 rounded-full object-cover bg-stone-100 border-2 border-stone-200">
                                    ${user.is_admin ? '<div class="absolute -top-1 -right-1 bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px]" title="Модератор"><i class="fa-solid fa-shield"></i></div>' : ''}
                                </div>
                                <div class="overflow-hidden w-full">
                                    <div class="font-black text-stone-800 truncate text-base flex items-center gap-2 mb-1">
                                        ${user.full_name || 'Без имени'} 
                                        ${isPro ? '<span class="bg-amber-100 text-amber-600 px-2 py-0.5 rounded text-[10px] uppercase tracking-widest">VIP</span>' : ''}
                                    </div>
                                    <div class="flex flex-wrap gap-2 text-xs text-stone-500 font-bold items-center mb-1">
                                        <span><i class="fa-regular fa-envelope mr-1"></i>${user.email || 'Нет email'}</span>
                                        ${phoneDisplay}
                                    </div>
                                    <div class="text-xs font-medium text-stone-400">Регистрация: ${regDate} • Товаров: <span class="text-stone-700 font-bold">${itemsCount}</span></div>
                                </div>
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto shrink-0 bg-stone-50 p-2 rounded-xl border border-stone-100">
                                <div class="flex items-center gap-1">
                                    <span class="text-[10px] font-bold text-stone-500 uppercase tracking-widest mr-1">Поднятия</span>
                                    <input type="number" id="balance-${user.id}" value="${user.wallet_balance || 0}" class="w-16 bg-white border border-stone-200 rounded-lg p-1.5 text-center text-sm font-bold text-brand-600 outline-none focus:border-brand-500">
                                    <button onclick="updateBalance('${user.id}', this)" class="bg-stone-200 text-stone-600 hover:bg-brand-500 hover:text-white w-8 h-8 rounded-lg flex items-center justify-center transition" title="Сохранить баланс"><i class="fa-solid fa-floppy-disk text-xs"></i></button>
                                </div>
                                
                                <div class="h-6 w-px bg-stone-200 hidden sm:block"></div>
                                
                                <button onclick="togglePro('${user.id}', ${isPro}, this)" class="flex-1 sm:flex-none ${isPro ? 'bg-amber-100 text-amber-600 hover:bg-stone-200' : 'bg-stone-200 text-stone-600 hover:bg-amber-400 hover:text-white'} px-4 py-2 rounded-lg font-bold text-sm transition flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-gem"></i> ${isPro ? '- VIP' : '+ VIP'}
                                </button>
                                <button onclick="deleteUser('${user.id}', this)" class="bg-stone-200 text-stone-400 hover:bg-red-500 hover:text-white w-9 h-9 rounded-lg transition flex items-center justify-center" title="Удалить профиль">
                                    <i class="fa-solid fa-ban"></i>
                                </button>
                            </div>
                        </div>
                    `);
                });
            } else if (adminState.currentTab === 'reports') {
                // ФИЛЬТРАЦИЯ ЖАЛОБ
                const filteredReports = adminState.reports.filter(r => 
                    (r.reason || '').toLowerCase().includes(searchTerm) || 
                    (r.comment || '').toLowerCase().includes(searchTerm)
                );

                if (filteredReports.length === 0) return list.innerHTML = '<div class="text-center py-20 text-stone-400 font-bold"><i class="fa-solid fa-check-double text-4xl mb-3 opacity-30 block"></i>Новых жалоб нет</div>';

                filteredReports.forEach(report => {
                    // Ищем данные пользователей в уже загруженном массиве
                    const reporter = adminState.profiles.find(p => p.id === report.reporter_id) || { full_name: 'Удаленный', email: 'нет' };
                    const reported = adminState.profiles.find(p => p.id === report.reported_user_id) || { full_name: 'Удаленный', email: 'нет' };
                    
                    const date = new Date(report.created_at).toLocaleDateString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    const isNew = report.status === 'new';

                    list.insertAdjacentHTML('beforeend', `
                        <div class="flex flex-col p-4 bg-white border ${isNew ? 'border-red-300 shadow-md' : 'border-stone-200 opacity-60'} rounded-xl hover:shadow-lg hover:opacity-100 transition gap-3 relative overflow-hidden">
                            ${isNew ? '<div class="absolute top-0 left-0 w-1 h-full bg-red-500"></div>' : ''}
                            
                            <div class="flex justify-between items-start pl-2">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest"><i class="fa-solid fa-dumpster-fire mr-1"></i> ${report.reason}</span>
                                        <span class="text-xs text-stone-400 font-bold">${date}</span>
                                    </div>
                                    <div class="text-sm font-medium text-stone-800 mt-2 bg-stone-50 p-3 rounded-lg border border-stone-100">
                                        ${report.comment ? `«${report.comment}»` : '<span class="text-stone-400 italic">Жалоба отправлена без комментария</span>'}
                                    </div>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-2 shrink-0">
                                    ${isNew ? `<button onclick="resolveReport('${report.id}', this)" class="bg-emerald-100 text-emerald-600 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-lg font-bold text-xs transition flex items-center justify-center" title="Отметить как решенную"><i class="fa-solid fa-check mr-1"></i> Решено</button>` : ''}
                                    <button onclick="deleteReport('${report.id}', this)" class="bg-stone-100 text-stone-400 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg font-bold text-xs transition flex items-center justify-center" title="Удалить жалобу"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-4 mt-2 pl-2 border-t border-stone-100 pt-3">
                                <div class="flex-1">
                                    <div class="text-[10px] text-stone-400 font-bold uppercase tracking-widest mb-1">Кто жалуется:</div>
                                    <div class="text-sm font-bold text-stone-700"><i class="fa-solid fa-user text-stone-300 mr-1"></i> ${reporter.full_name}</div>
                                    <div class="text-xs text-stone-500">${reporter.email}</div>
                                </div>
                                <div class="hidden sm:flex items-center text-stone-300"><i class="fa-solid fa-arrow-right"></i></div>
                                <div class="flex-1 bg-red-50 p-2 rounded-lg border border-red-100 flex flex-col justify-between items-start">
                                    <div>
                                        <div class="text-[10px] text-red-500 font-bold uppercase tracking-widest mb-1">На кого:</div>
                                        <div class="text-sm font-bold text-red-700"><i class="fa-solid fa-user-slash text-red-300 mr-1"></i> ${reported.full_name}</div>
                                        <div class="text-xs text-red-500 mb-2">${reported.email}</div>
                                    </div>
                                    <!-- Прямая кнопка бана из карточки жалобы -->
                                    <button onclick="deleteUser('${report.reported_user_id}', this)" class="w-full sm:w-auto bg-red-500 text-white hover:bg-red-600 px-3 py-1.5 rounded-md font-bold text-xs transition flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-ban"></i> Забанить</button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            }
        }

        async function updateBalance(userId, btn) {
            const input = document.getElementById(`balance-${userId}`);
            const newBalance = parseInt(input.value) || 0;
            const originalHtml = btn.innerHTML;
            
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i>';
            const { error } = await supabaseClient.from('profiles').update({ wallet_balance: newBalance }).eq('id', userId);
            
            if (error) {
                alert("Ошибка обновления баланса: " + error.message);
            } else {
                const userIndex = adminState.profiles.findIndex(p => p.id === userId);
                if(userIndex > -1) adminState.profiles[userIndex].wallet_balance = newBalance;
                btn.classList.replace('bg-stone-200', 'bg-emerald-500');
                btn.classList.replace('text-stone-600', 'text-white');
                setTimeout(() => {
                    btn.classList.replace('bg-emerald-500', 'bg-stone-200');
                    btn.classList.replace('text-white', 'text-stone-600');
                }, 1000);
            }
            btn.disabled = false; btn.innerHTML = originalHtml;
        }

        async function deleteItem(itemId, btn) {
            if(!confirm("Снести этот товар навсегда?")) return;
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            const { error } = await supabaseClient.from('items').delete().eq('id', itemId);
            if (error) { alert("Ошибка: " + error.message); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-trash"></i> Удалить'; } 
            else { adminState.items = adminState.items.filter(i => i.id !== itemId); btn.parentElement.style.opacity = '0'; setTimeout(() => renderList(), 300); }
        }

        async function togglePro(userId, currentStatus, btn) {
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            let newDate = null;
            if (!currentStatus) { const d = new Date(); d.setDate(d.getDate() + 30); newDate = d.toISOString(); }
            const { error } = await supabaseClient.from('profiles').update({ pro_until: newDate }).eq('id', userId);
            if (error) { alert("Ошибка выдачи PRO: " + error.message); renderList(); } 
            else { const userIndex = adminState.profiles.findIndex(p => p.id === userId); if(userIndex > -1) adminState.profiles[userIndex].pro_until = newDate; renderList(); }
        }

        async function deleteUser(userId, btn) {
            if(!confirm("Удалить профиль пользователя? Это необратимо!")) return;
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            const { error } = await supabaseClient.from('profiles').delete().eq('id', userId);
            if (error) { alert("Ошибка удаления: " + error.message); renderList(); } 
            else { adminState.profiles = adminState.profiles.filter(p => p.id !== userId); btn.parentElement.parentElement.style.opacity = '0'; setTimeout(() => renderList(), 300); }
        }

        // НОВЫЕ ФУНКЦИИ ДЛЯ ЖАЛОБ
        async function resolveReport(reportId, btn) {
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            const { error } = await supabaseClient.from('reports').update({ status: 'resolved' }).eq('id', reportId);
            if (error) { alert("Ошибка: " + error.message); renderList(); } 
            else { 
                const index = adminState.reports.findIndex(r => r.id === reportId); 
                if(index > -1) adminState.reports[index].status = 'resolved'; 
                renderList(); 
            }
        }

        async function deleteReport(reportId, btn) {
            if(!confirm("Окончательно удалить жалобу из базы?")) return;
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            const { error } = await supabaseClient.from('reports').delete().eq('id', reportId);
            if (error) { alert("Ошибка: " + error.message); renderList(); } 
            else { adminState.reports = adminState.reports.filter(r => r.id !== reportId); renderList(); }
        }

        initAdminPanel();
    </script>
</body>
</html>
